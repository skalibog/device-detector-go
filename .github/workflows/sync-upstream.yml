name: Sync upstream regex database

on:
  schedule:
    - cron: "17 6 1 * *" # monthly
  workflow_dispatch:
    inputs:
      ref:
        description: matomo/device-detector ref to sync (default = pinned)
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
      - name: Sync regexes and fixtures
        run: bash scripts/sync-upstream.sh ${{ inputs.ref || 'master' }}
      - name: Validate against new corpus
        run: go test -count=1 -run TestFixtures -v . 2>&1 | tail -20
        continue-on-error: true
      - name: Open PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: sync/upstream-regexes
          title: "Sync regex database from matomo/device-detector"
          commit-message: "Sync regex database from upstream"
          body: |
            Automated sync of `data/regexes/` and `testdata/fixtures/` from
            matomo/device-detector. Check the CI fixture gate: mismatches mean
            upstream added parser logic that needs porting.
