name: govulncheck

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    - cron: "23 5 * * 1" # weekly — vulnerabilities surface without commits
  workflow_dispatch:

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v7
        with:
          go-version: "1.24"
      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
