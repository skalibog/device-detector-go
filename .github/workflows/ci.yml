name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: gofmt
        run: test -z "$(gofmt -l . | grep -v testdata)"
      - name: go vet
        run: go vet ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

  test:
    name: Tests (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.22", "1.23", "1.24"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Unit tests (race)
        # The fixture corpus is excluded here: it has its own non-race job,
        # and under the race detector it exceeds hosted-runner budgets.
        run: go test -race -short -count=1 -skip TestFixtures -timeout 20m ./...

  fixtures:
    name: Upstream fixture corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Full corpus (36,333 entries, zero-mismatch gate) + coverage
        # Hosted runners are far slower than dev machines; go test's default
        # 10m timeout is not enough for the 36k-entry corpus.
        run: |
          go test -count=1 -coverpkg=./... -coverprofile=coverage.out -timeout 60m ./...
          go tool cover -func=coverage.out | tail -1
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
