name: Port bug
description: This port's output differs from upstream matomo/device-detector for the same UA
labels: [bug]
body:
  - type: input
    id: ua
    attributes:
      label: User agent
      placeholder: Mozilla/5.0 (...)
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Upstream PHP output
      description: What matomo/device-detector (same database version) returns. The upstream demo at https://devicedetector.lw1.at/ can help.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: This port's output
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Module version
      placeholder: v0.1.0
    validations:
      required: true
